<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 180" width="140" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c281f"/>
      <stop offset="100%" stop-color="#0f1610"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b56a"/>
      <stop offset="50%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#a07d28"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8aaa7e"/>
      <stop offset="100%" stop-color="#5d8a4a"/>
    </linearGradient>
    <linearGradient id="bark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d4a32"/>
      <stop offset="100%" stop-color="#3d2e1f"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="logoClip">
      <path d="M15 155 Q15 168 28 172 L112 172 Q125 168 125 155 L125 28 Q125 15 112 12 L28 12 Q15 15 15 28 Z"/>
    </clipPath>
  </defs>

  <!-- Background plaque -->
  <path d="M15 155 Q15 168 28 172 L112 172 Q125 168 125 155 L125 28 Q125 15 112 12 L28 12 Q15 15 15 28 Z"
        fill="url(#bg)" stroke="url(#gold)" stroke-width="2" filter="url(#shadow)"/>

  <!-- Inner decorative border -->
  <path d="M24 148 L24 32 Q24 24 32 22 L108 22 Q116 24 116 32 L116 148"
        fill="none" stroke="url(#gold)" stroke-width="0.6" opacity="0.35"/>

  <!-- LEFT ELF EAR -->
  <g>
    <path d="M42 14 Q34 -8 22 -2 Q14 4 20 18 Q26 24 36 20 Q40 17 42 14Z"
          fill="url(#bg)" stroke="url(#gold)" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M38 13 Q32 2 26 6 Q22 10 28 18"
          fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
    <path d="M40 12 Q35 5 30 8"
          fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.35"/>
  </g>

  <!-- RIGHT ELF EAR -->
  <g>
    <path d="M98 14 Q106 -8 118 -2 Q126 4 120 18 Q114 24 104 20 Q100 17 98 14Z"
          fill="url(#bg)" stroke="url(#gold)" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M102 13 Q108 2 114 6 Q118 10 112 18"
          fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
    <path d="M100 12 Q105 5 110 8"
          fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.35"/>
  </g>

  <!-- SH letterform as stylized shelves -->
  <g transform="translate(36, 42)" filter="url(#glow-sm)">
    <!-- S left curve pillar -->
    <path d="M8 8 Q8 4 12 4 L22 4 Q26 4 26 8 L26 14 Q26 18 22 18 L12 18 Q8 18 8 22 L8 36 Q8 40 12 40 L22 40 Q26 40 26 44 L26 50 Q26 54 22 54 L12 54 Q8 54 8 50 L8 44"
          fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Middle divider bar -->
    <line x1="28" y1="18" x2="38" y2="18" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- S right curve pillar -->
    <path d="M44 8 Q44 4 48 4 L58 4 Q62 4 62 8 L62 14 Q62 18 58 18 L48 18 Q44 18 44 22 L44 36 Q44 40 48 40 L58 40 Q62 40 62 44 L62 50 Q62 54 58 54 L48 54 Q44 54 44 50 L44 44"
          fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Left shelf horizontal -->
    <line x1="4" y1="18" x2="32" y2="18" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Right shelf horizontal -->
    <line x1="38" y1="18" x2="66" y2="18" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Tiny books left shelf -->
    <rect x="8" y="7" width="4" height="11" rx="0.8" fill="url(#leaf)" opacity="0.85"/>
    <rect x="8" y="7" width="4" height="3" rx="0.8" fill="#8aaa7e" opacity="0.6"/>
    <rect x="14" y="9" width="3" height="9" rx="0.6" fill="#c9a962" opacity="0.7"/>
    <rect x="19" y="6" width="5" height="12" rx="0.8" fill="url(#bark)" opacity="0.8"/>
    <rect x="19" y="6" width="5" height="3" rx="0.8" fill="#8a6b4a" opacity="0.5"/>

    <!-- Tiny books right shelf -->
    <rect x="42" y="8" width="4" height="10" rx="0.8" fill="#c9a962" opacity="0.75"/>
    <rect x="42" y="8" width="4" height="2.5" rx="0.8" fill="#d4b56a" opacity="0.6"/>
    <rect x="48" y="6" width="5" height="12" rx="0.8" fill="url(#leaf)" opacity="0.8"/>
    <rect x="48" y="6" width="5" height="3" rx="0.8" fill="#8aaa7e" opacity="0.5"/>
    <rect x="55" y="9" width="3.5" height="9" rx="0.6" fill="url(#bark)" opacity="0.75"/>
  </g>

  <!-- H letterform above -->
  <g transform="translate(36, 16)" opacity="0.55">
    <text x="35" y="22" text-anchor="middle" font-family="'Cinzel', serif" font-size="18" font-weight="600" fill="url(#gold)" letter-spacing="2">H</text>
  </g>

  <!-- Bottom vine flourish -->
  <g opacity="0.55">
    <path d="M30 158 Q50 153 70 156 Q90 159 110 154" fill="none" stroke="#5d7048" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M35 162 Q55 158 75 160 Q95 163 105 159" fill="none" stroke="#4b6b4a" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
    <!-- Leaves -->
    <ellipse cx="48" cy="153" rx="4" ry="7" fill="url(#leaf)" opacity="0.5" transform="rotate(-30 48 153)"/>
    <ellipse cx="70" cy="155" rx="3.5" ry="6" fill="#6d8c5a" opacity="0.45" transform="rotate(20 70 155)"/>
    <ellipse cx="92" cy="153" rx="4" ry="6.5" fill="url(#leaf)" opacity="0.5" transform="rotate(-20 92 153)"/>
    <ellipse cx="58" cy="160" rx="3" ry="5" fill="#5d8a4a" opacity="0.35" transform="rotate(35 58 160)"/>
    <ellipse cx="82" cy="161" rx="3" ry="5.5" fill="url(#leaf)" opacity="0.35" transform="rotate(-25 82 161)"/>
  </g>

  <!-- Top sparkle -->
  <g opacity="0.5">
    <line x1="70" y1="10" x2="70" y2="6" stroke="url(#gold)" stroke-width="1" stroke-linecap="round"/>
    <line x1="66" y1="8" x2="74" y2="8" stroke="url(#gold)" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Bottom sparkle -->
  <g opacity="0.4">
    <line x1="20" y1="165" x2="20" y2="161" stroke="url(#gold)" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="17" y1="163" x2="23" y2="163" stroke="url(#gold)" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="112" y1="166" x2="112" y2="162" stroke="url(#gold)" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="109" y1="164" x2="115" y2="164" stroke="url(#gold)" stroke-width="0.6" stroke-linecap="round"/>
  </g>
</svg>
